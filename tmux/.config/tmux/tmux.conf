#===============================================================================
# DESIGN: 256 COLOR SUPPORT
# setw -g default-terminal "screen-256color"
# set -g default-terminal "xterm"
# set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",*256col*:Tc"

# set -g default-terminal "xterm"
# for kitty
# set -ga terminal-overrides  ",xterm-kitty:Tc"
# remap prefix to Control + a

# Add tmux plugin manager
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Press prefix + I (capital i, as in Install) to fetch the plugin.

# make colors inside tmux look the same as outside of tmux
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
# see https://github.com/tmux/tmux/issues/696
# see https://stackoverflow.com/a/41786092

# macos
# set -g default-terminal "screen-256color"
set -g prefix `
set -g prefix2 C-s
# set -g prefix2 M-d
unbind C-b
bind ` send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

setw -g mode-keys vi

# force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# resize
bind -r H resize-pane -L 5   # 5 px bigger to the left
bind -r J resize-pane -D 5   # 5 px bigger down
bind -r K resize-pane -U 5   # 5 px bigger up
bind -r L resize-pane -R 5   # 5 px bigger right

# open new pane in the same directory
# https://gist.github.com/william8th/faf23d311fc842be698a1d80737d9631
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
# bind c new-window -c "#{pane_current_path}"

bind-key -n M-h previous-window
bind-key -n M-l next-window

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# Jump between last windows
bind-key Tab last-window

set -g lock-command vlock
set -g lock-after-time 0 # Seconds; 0 = never
bind l lock-client
# bind L lock-session

bind-key -n C-F3 set-option -g status #Ctrl+F3 Combo
bind S set-option -g status 

bind k copy-mode
# bind j copy-mode -d

set-option -g status-position top
# staus line colors
# set -g status-bg white
# set -g status-fg black
# set-option -ag status-right "#[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d ' ' | cut -f 1 -d ',') "


set -s command-alias[10] vsp='split-window -h'

# vi style copy paste
# https://dev.to/iggredible/the-easy-way-to-copy-text-in-tmux-319g
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"
bind P paste-buffer
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Alt+N → switch to window N (Alt+0 → window 10)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10

# right status: mem cpu load
# set -g status-right "#[fg=green]#($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load --colors --powerline-right --interval 2)#[default]"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set -g @plugin 'thewtex/tmux-mem-cpu-load'
# set -g @plugin 'seebi/tmux-colors-solarized'
# https://github.com/dracula/tmux
set -g @plugin 'dracula/tmux'
set -g @dracula-cpu-usage true
set -g @dracula-ram-usage true
set -g @dracula-gpu-usage false
set -g @dracula-show-weather false
set -g @dracula-show-fahrenheit false
set -g @dracula-military-time true
set -g @dracula-show-timezone false
set -g @dracula-show-left-icon [λ] 
set -g @dracula-left-icon-padding 2
set -g @dracula-day-month true
set -g @dracula-border-contrast true
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g status-left '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# Left status: session | battery | date and time
# set -g status-left "#{prefix_highlight} | #[bold]#S #[fg=black]| #{battery_percentage} | %FT%H:%M |"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# vim: se ft=tmux :
